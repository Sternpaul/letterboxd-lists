name: Update Radarr Lists
on:
  schedule:
    - cron: "0 0 * * 0" 
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and filter lists
        run: |
          mkdir -p public
          curl -s "https://letterboxd-list-radarr.onrender.com/official/list/top-100-french-films/" | jq '.[0:50]' > public/french-top50.json
          curl -s "https://letterboxd-list-radarr.onrender.com/official/list/top-100-anime-films/" | jq '.[0:50]' > public/anime-top50.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/*.json
          git commit -m "Update movie lists" || exit 0
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
